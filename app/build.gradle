apply plugin: 'com.android.application'

android {
    namespace 'com.rivergauge.app'
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.rivergauge.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}

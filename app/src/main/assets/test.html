<!DOCTYPE html>
<html>
<body>
<div id="out">starting...</div>
<script>
document.getElementById('out').textContent = 'trying...';
fetch('https://waterservices.usgs.gov/nwis/dv/?format=json&sites=04097500&parameterCd=00065&startDT=2025-01-01&endDT=2025-03-01&siteStatus=all')
  .then(r => r.json())
  .then(d => {
    const ts = d?.value?.timeSeries || [];
    document.getElementById('out').textContent = 'dv series: ' + ts.length + ' records: ' + (ts[0]?.values?.[0]?.value?.length||0);
  })
  .catch(e => { document.getElementById('out').textContent = 'error: ' + e; });
</script>
</body>
</html>

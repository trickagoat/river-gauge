<!DOCTYPE html>
<html>
<body>
<div id="out">trying...</div>
<script>
fetch('https://waterservices.usgs.gov/nwis/iv/?format=json&sites=04097500&parameterCd=00065&startDT=2024-01-01&endDT=2024-12-31')
  .then(r => r.json())
  .then(d => {
    const ts = d?.value?.timeSeries || [];
    const n = ts[0]?.values?.[0]?.value?.length || 0;
    document.getElementById('out').textContent = 'iv series: ' + ts.length + ' records: ' + n;
  })
  .catch(e => { document.getElementById('out').textContent = 'error: ' + e; });
</script>
</body>
</html>

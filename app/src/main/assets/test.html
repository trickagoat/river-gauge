<!DOCTYPE html>
<html>
<body>
<div id="out">trying...</div>
<script>
const years = ['2021','2022','2023','2024','2025'];
Promise.all(years.map(y =>
  fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=04097500&parameterCd=00065&startDT=${y}-01-01&endDT=${y}-12-31`)
    .then(r => r.json())
    .then(d => y + ':' + (d?.value?.timeSeries?.[0]?.values?.[0]?.value?.length||0))
    .catch(e => y + ':error')
)).then(results => {
  document.getElementById('out').textContent = results.join(' | ');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f0f4f8">
<title>Action Stage History · St. Joseph River</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f8; --surface:#e2e8f0; --card:#ffffff;
    --border:rgba(30,80,160,0.13); --accent:#1a56c4; --accent2:#2563eb;
    --warn:#d97706; --ok:#16a34a; --major:#dc2626;
    --text:#1e293b; --muted:#64748b;
    --mono:'DM Mono',monospace; --serif:'Playfair Display',serif; --sans:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  header{padding:16px;border-bottom:1px solid var(--border);
    background:rgba(240,244,248,.95);backdrop-filter:blur(12px);
    position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
  .hl .lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
  .hl h1{font-family:var(--serif);font-size:20px;line-height:1.2;color:var(--text)}
  .hl .sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
  .back{background:var(--accent);border:none;color:#fff;border-radius:8px;
    padding:8px 13px;font-family:var(--mono);font-size:11px;cursor:pointer;
    letter-spacing:1px;text-decoration:none;display:inline-block}
  .wrap{padding:13px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:17px;margin-bottom:11px;box-shadow:0 1px 4px rgba(30,80,160,.07)}
  .ct{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--muted);
    text-transform:uppercase;margin-bottom:13px}
  .ld{text-align:center;padding:70px 20px;font-family:var(--mono);font-size:12px;
    color:var(--muted);letter-spacing:1px}
  .wv{display:inline-flex;gap:4px;margin-bottom:18px}
  .wv span{display:block;width:4px;height:22px;background:var(--accent);border-radius:2px;
    animation:wvk 1.2s ease-in-out infinite}
  .wv span:nth-child(2){animation-delay:.12s}.wv span:nth-child(3){animation-delay:.24s}
  .wv span:nth-child(4){animation-delay:.36s}.wv span:nth-child(5){animation-delay:.48s}
  @keyframes wvk{0%,100%{transform:scaleY(.35);opacity:.35}50%{transform:scaleY(1.2);opacity:1}}
  .chart-wrap{position:relative;width:100%;overflow:hidden}
  canvas{display:block;border-radius:4px}
  .mtable{width:100%;border-collapse:collapse}
  .mtable th{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted);
    text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
  .mtable td{font-family:var(--mono);font-size:12px;padding:7px 8px;
    border-bottom:1px solid rgba(30,80,160,.06);white-space:nowrap}
  .mtable td:first-child{min-width:80px}
  .mtable tr:last-child td{border-bottom:none}
  .bar-cell{width:40%}
  .mini-bar{height:10px;border-radius:3px;min-width:2px}
  .days-0{color:var(--muted)}
  .days-hi{color:var(--major);font-weight:500}
  .note{background:rgba(30,86,196,.06);border:1px solid rgba(30,86,196,.15);
    border-radius:10px;padding:11px 13px;font-family:var(--mono);font-size:10px;
    color:var(--muted);line-height:1.8;margin-bottom:11px;text-align:center}
  .err{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:12px;
    padding:18px;color:#dc2626;font-family:var(--mono);font-size:12px;text-align:center;line-height:1.9}
  footer{text-align:center;padding:14px 14px 30px;font-size:11px;
    color:var(--muted);font-family:var(--mono);line-height:2}
  footer a{color:var(--accent);text-decoration:none}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <div class="hl">
    <div class="lbl">USGS 04097500</div>
    <h1>Action Stage History</h1>
    <div class="sub">Days at or above 6.0 ft per month</div>
  </div>
  <a class="back" href="gauge.html">&#8592; Live</a>
</header>
<div class="wrap" id="wrap">
  <div class="ld"><div class="wv"><span></span><span></span><span></span><span></span><span></span></div><div>LOADING...</div></div>
</div>
<footer>
  <a href="https://waterdata.usgs.gov/monitoring-location/04097500/" target="_blank">USGS 04097500</a><br>
  St. Joseph River at Three Rivers, MI/IN
</footer>
<script>
window.onerror = function(msg,src,line) {
  document.getElementById('wrap').innerHTML = '<div class="err">JS ERROR line ' + line + ': ' + msg + '</div>';
  return true;
};
</script>
<script>
var ACTION_STAGE = 6.0;

function fetchYear(year) {
  var now = new Date();
  var end = year === now.getFullYear() ? now.toISOString().slice(0,10) : year + '-12-31';
  var url = 'https://waterservices.usgs.gov/nwis/iv/?format=json&sites=04097500&parameterCd=00065&startDT=' + year + '-01-01&endDT=' + end;
  return fetch(url, {cache:'no-store'})
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .catch(function() { return null; });
}

function processYear(json) {
  var vals = json && json.value && json.value.timeSeries && json.value.timeSeries[0] &&
    json.value.timeSeries[0].values && json.value.timeSeries[0].values[0] &&
    json.value.timeSeries[0].values[0].value ? json.value.timeSeries[0].values[0].value : [];
  var dayMax = {};
  for (var i = 0; i < vals.length; i++) {
    var v = vals[i];
    if (v.value === '-999999' || isNaN(parseFloat(v.value))) continue;
    var date = v.dateTime.slice(0,10);
    var stage = parseFloat(v.value);
    if (dayMax[date] === undefined || stage > dayMax[date]) dayMax[date] = stage;
  }
  var monthMap = {};
  var dates = Object.keys(dayMax);
  for (var j = 0; j < dates.length; j++) {
    var d = dates[j];
    var ym = d.slice(0,7);
    if (!monthMap[ym]) monthMap[ym] = {action:0, peak:0};
    if (dayMax[d] >= ACTION_STAGE) monthMap[ym].action++;
    if (dayMax[d] > monthMap[ym].peak) monthMap[ym].peak = dayMax[d];
  }
  return monthMap;
}

function monthLabel(ym) {
  var parts = ym.split('-');
  var y = parts[0], m = parseInt(parts[1]);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[m-1] + ' ' + y;
}

function delay(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}
async function load() {
  var wrap = document.getElementById('wrap');
  wrap.innerHTML = '<div class="note">Starting...</div>';
  
  var now = new Date();
  var currentYear = now.getFullYear();
  var years = [];
  for (var y = currentYear - 4; y <= currentYear; y++) years.push(y);

  var allMonthMap = {};

  for (var i = 0; i < years.length; i++) {
    var year = years[i];
    wrap.innerHTML = '<div class="note">Loading ' + year + ' of ' + currentYear + '...</div>';
    var json = await fetchYear(year);
    if (!json) {
      wrap.innerHTML += '<div class="note">Warning: ' + year + ' unavailable</div>';
      await delay(500);
      continue;
    }
    var yearMap = processYear(json);
    var keys = Object.keys(yearMap);
    for (var k = 0; k < keys.length; k++) {
      allMonthMap[keys[k]] = yearMap[keys[k]];
    }
    var actionTotal = 0;
    for (var k = 0; k < keys.length; k++) actionTotal += yearMap[keys[k]].action;
    wrap.innerHTML = '<div class="note">Loaded ' + year + ' (' + actionTotal + ' action days). Loading next...</div>';
    await delay(300);
  }

  var allMonths = [];
  for (var i = 59; i >= 0; i--) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var ym = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    allMonths.push(ym);
  }

  var maxDays = 1;
  var totalActionDays = 0;
  for (var i = 0; i < allMonths.length; i++) {
    var days = allMonthMap[allMonths[i]] ? allMonthMap[allMonths[i]].action : 0;
    if (days > maxDays) maxDays = days;
    totalActionDays += days;
  }

  if (totalActionDays === 0 && Object.keys(allMonthMap).length === 0) {
    wrap.innerHTML = '<div class="err">No data could be loaded.</div>';
    return;
  }

  render(allMonths, allMonthMap, maxDays, totalActionDays);
}

function render(allMonths, monthMap, maxDays, totalActionDays) {
  var chartMonths = allMonths.slice(-24);
  var reversed = allMonths.slice().reverse();

  var rows = '';
  for (var i = 0; i < reversed.length; i++) {
    var ym = reversed[i];
    var days = monthMap[ym] ? monthMap[ym].action : 0;
    var peak = monthMap[ym] ? monthMap[ym].peak : 0;
    var pct = Math.round((days / maxDays) * 100);
    var cls = days === 0 ? 'days-0' : days >= 10 ? 'days-hi' : '';
    var barColor = days >= 10 ? 'var(--major)' : days >= 5 ? 'var(--warn)' : 'var(--accent)';
    var peakColor = peak >= ACTION_STAGE ? 'var(--warn)' : 'var(--muted)';
    rows += '<tr>' +
      '<td>' + monthLabel(ym) + '</td>' +
      '<td class="' + cls + '">' + (days === 0 ? '&mdash;' : days) + '</td>' +
      '<td style="color:' + peakColor + '">' + (peak > 0 ? peak.toFixed(2) + ' ft' : '&mdash;') + '</td>' +
      '<td class="bar-cell">' +
        (days > 0 ? '<div class="mini-bar" style="width:' + pct + '%;background:' + barColor + '"></div>' : '') +
      '</td>' +
    '</tr>';
  }

  var html = '<div class="note">Days with max stage &ge; ' + ACTION_STAGE + ' ft &mdash; ' + totalActionDays + ' total action days</div>' +
    '<div class="card" style="animation:fu .3s ease both">' +
      '<div class="ct">Last 24 Months &mdash; Action Days per Month</div>' +
      '<div class="chart-wrap"><canvas id="hc" height="160"></canvas></div>' +
    '</div>' +
    '<div class="card" style="animation:fu .4s ease both">' +
      '<div class="ct">All 60 Months &mdash; Detail</div>' +
      '<table class="mtable">' +
        '<thead><tr>' +
          '<th>Month</th><th>Action Days</th><th>Peak Stage</th><th class="bar-cell"></th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>';

  document.getElementById('wrap').innerHTML = html;
  drawChart(chartMonths, monthMap, maxDays);
}

function drawChart(months, monthMap, maxDays) {
  var canvas = document.getElementById('hc');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.parentElement.clientWidth;
  var H = 160;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var pad = {top:14, right:8, bottom:36, left:32};
  var cW = W - pad.left - pad.right;
  var cH = H - pad.top - pad.bottom;
  var n = months.length;
  var barW = Math.max(2, (cW / n) - 2);
  var gap = cW / n;
  var gridMax = Math.max(maxDays, 5);

  ctx.fillStyle = '#f8fafc';
  ctx.fillRect(0, 0, W, H);

  for (var i = 0; i <= 4; i++) {
    var y = pad.top + (i / 4) * cH;
    ctx.strokeStyle = 'rgba(30,80,160,.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#475569';
    ctx.font = '9px "DM Mono",monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(gridMax - (i / 4) * gridMax), pad.left - 4, y + 3.5);
  }

  for (var i = 0; i < months.length; i++) {
    var ym = months[i];
    var days = monthMap[ym] ? monthMap[ym].action : 0;
    var barH = days > 0 ? Math.max(3, (days / gridMax) * cH) : 0;
    var x = pad.left + i * gap + (gap - barW) / 2;
    var y = pad.top + cH - barH;
    var color = days >= 10 ? '#dc2626' : days >= 5 ? '#d97706' : '#1a56c4';
    ctx.fillStyle = color;
    ctx.fillRect(x, y, barW, barH);

    if (i % 6 === 0 || i === n - 1) {
      var parts = ym.split('-');
      var mo = parseInt(parts[1]);
      var yr = parts[0];
      var mlabels = ['J','F','M','A','M','J','J','A','S','O','N','D'];
      var label = mlabels[mo-1] + "'" + yr.slice(2);
      ctx.fillStyle = '#475569';
      ctx.font = '9px "DM Mono",monospace';
      ctx.textAlign = 'center';
      ctx.fillText(label, x + barW / 2, H - 6);
    }

    if (days > 0 && barH > 14) {
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 8px "DM Mono",monospace';
      ctx.textAlign = 'center';
      ctx.fillText(days, x + barW / 2, y - 3);
    }
  }
}

load();
</script>
</body>
</html>

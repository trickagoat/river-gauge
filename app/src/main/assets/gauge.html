<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f0f4f8">
<title>St. Joseph River · Three Rivers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f8; --surface:#e2e8f0; --card:#ffffff;
    --border:rgba(30,80,160,0.13); --accent:#1a56c4;
    --accent2:#2563eb; --warn:#d97706; --ok:#16a34a;
    --minor:#d97706; --moderate:#ea580c; --major:#dc2626;
    --text:#1e293b; --muted:#64748b;
    --mono:'DM Mono',monospace; --serif:'Playfair Display',serif; --sans:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

  header{padding:16px 16px 12px;border-bottom:1px solid var(--border);
    background:rgba(240,244,248,.95);backdrop-filter:blur(12px);
    position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
  .hl .lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
  .hl h1{font-family:var(--serif);font-size:20px;line-height:1.2;color:var(--text)}
  .hl .sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
  .rbtn{background:var(--accent);border:none;color:#fff;
    border-radius:8px;padding:8px 13px;font-family:var(--mono);font-size:11px;
    cursor:pointer;letter-spacing:1px;flex-shrink:0;transition:all .2s;white-space:nowrap}
  .rbtn:active{opacity:.75}
  .rbtn.busy{opacity:.45;pointer-events:none}

  .wrap{padding:13px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:17px;margin-bottom:11px;animation:fu .4s ease both;
    box-shadow:0 1px 4px rgba(30,80,160,.07)}
  .ct{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--muted);
    text-transform:uppercase;margin-bottom:11px}

  .srow{display:flex;align-items:center;gap:12px}
  .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
  .dot.pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
  .slabel{font-size:17px;font-weight:500;color:var(--text)}
  .ssub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}

  .rc{text-align:center;padding:4px 0}
  .bign{font-family:var(--mono);font-size:60px;font-weight:500;line-height:1;
    color:var(--accent);letter-spacing:-2px}
  .bigu{font-family:var(--mono);font-size:16px;color:var(--muted)}
  .bigf{font-family:var(--mono);font-size:19px;color:var(--accent2);margin-top:8px}
  .bigt{font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono)}

  .barw{height:23px;background:var(--surface);border-radius:6px;overflow:hidden;
    border:1px solid var(--border);margin-bottom:13px}
  .barf{height:100%;border-radius:6px;
    background:linear-gradient(90deg,#3b82f6,var(--accent));
    transition:width 1.2s cubic-bezier(.4,0,.2,1);position:relative}
  .barf::after{content:'';position:absolute;right:0;top:0;bottom:0;
    width:3px;background:var(--accent);box-shadow:0 0 8px var(--accent)}

  .sr{display:flex;align-items:center;justify-content:space-between;
    padding:7px 9px;border-radius:7px;margin-bottom:4px}
  .sr.on{background:rgba(30,86,196,.08)}
  .sl{display:flex;align-items:center;gap:8px}
  .sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sn{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--muted)}
  .sv{font-family:var(--mono);font-weight:500;font-size:13px}

  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
  .ic{background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:13px 9px;text-align:center;animation:fu .5s ease both;
    box-shadow:0 1px 4px rgba(30,80,160,.07)}
  .icl{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);
    text-transform:uppercase;margin-bottom:5px}
  .icv{font-family:var(--mono);font-size:19px;font-weight:500;color:var(--text)}
  .icu{font-size:10px;color:var(--muted);margin-top:2px}

  canvas{width:100%!important;display:block;border-radius:4px;margin-top:10px}

  .fr{display:flex;justify-content:space-between;align-items:center;
    padding:8px 10px;background:var(--surface);border-radius:8px;
    margin-bottom:5px;border:1px solid var(--border)}
  .ft{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .fv{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent2)}

  .noaa-img{width:100%;border-radius:8px;display:block;border:1px solid var(--border)}
  .noaa-img-wrap{margin-top:10px;overflow:hidden;border-radius:8px;background:var(--surface)}

  .ld{text-align:center;padding:70px 20px;font-family:var(--mono);font-size:12px;
    color:var(--muted);letter-spacing:1px}
  .wv{display:inline-flex;gap:4px;margin-bottom:18px}
  .wv span{display:block;width:4px;height:22px;background:var(--accent);border-radius:2px;
    animation:wvk 1.2s ease-in-out infinite}
  .wv span:nth-child(2){animation-delay:.12s}.wv span:nth-child(3){animation-delay:.24s}
  .wv span:nth-child(4){animation-delay:.36s}.wv span:nth-child(5){animation-delay:.48s}
  @keyframes wvk{0%,100%{transform:scaleY(.35);opacity:.35}50%{transform:scaleY(1.2);opacity:1}}

  .err{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:12px;
    padding:18px;color:#dc2626;font-family:var(--mono);font-size:12px;text-align:center;
    line-height:1.9;margin:8px 0}
  .note{background:rgba(30,86,196,.06);border:1px solid rgba(30,86,196,.15);
    border-radius:10px;padding:11px 13px;font-family:var(--mono);font-size:10px;
    color:var(--muted);line-height:1.8;margin-bottom:11px;text-align:center}

  footer{text-align:center;padding:14px 14px 30px;font-size:11px;
    color:var(--muted);font-family:var(--mono);line-height:2}
  footer a{color:var(--accent);text-decoration:none}
  @keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="hl">
    <div class="lbl">USGS 04097500</div>
    <h1>St. Joseph River</h1>
    <div class="sub">Three Rivers, MI &middot; NOAA TRVM4</div>
  </div>
  <button class="rbtn" id="rbtn" onclick="loadAll()">&#8635; REFRESH</button>
</header>

<div class="wrap" id="wrap">
  <div class="ld"><div class="wv"><span></span><span></span><span></span><span></span><span></span></div><div>FETCHING LIVE DATA&hellip;</div></div>
</div>

<footer>
  <a href="https://waterdata.usgs.gov/monitoring-location/04097500/" target="_blank">USGS 04097500</a> &middot;
  <a href="https://water.noaa.gov/gauges/trvm4" target="_blank">NOAA TRVM4</a> &middot;
  <a href="history.html">📅 History</a><br>
  St. Joseph River at Three Rivers, MI/IN<br>
  <span id="ts"></span>
</footer>

<script>
// Correct NWS flood stages for TRVM4
const S = { action:6.0, minor:7.0, moderate:9.0, major:11.0 };

const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

const USGS_URL = 'https://waterservices.usgs.gov/nwis/iv/?format=json&sites=04097500&parameterCd=00065,00060&period=P7D';
const NOAA_API = 'https://api.water.noaa.gov/nwps/v1/gauges/trvm4/stageflow';
const NOAA_IMG = 'https://water.noaa.gov/images/hydrographs/trvm4_hg.png';

async function tryFetch(url, isJson) {
  try {
    const r = await fetch(url, {cache:'no-store'});
    if (!r.ok) throw new Error(r.status);
    return isJson ? r.json() : r.text();
  } catch(e) { return null; }
}

async function fetchWithProxies(url, isJson) {
  const direct = await tryFetch(url, isJson);
  if (direct) return direct;
  for (const proxy of PROXIES) {
    const result = await tryFetch(proxy(url), isJson);
    if (result) return result;
  }
  return null;
}

function fmt(t) {
  if (!t) return '';
  return new Date(t).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}

function statusFor(stage, stages) {
  if (stage === null) return {label:'Unknown',color:'#94a3b8',pulse:false};
  if (stage >= stages.major)    return {label:'Major Flood',color:'#dc2626',pulse:true};
  if (stage >= stages.moderate) return {label:'Moderate Flood',color:'#ea580c',pulse:true};
  if (stage >= stages.minor)    return {label:'Minor Flood',color:'#d97706',pulse:true};
  if (stage >= stages.action)   return {label:'Action Stage',color:'#ca8a04',pulse:true};
  return {label:'Normal',color:'#16a34a',pulse:false};
}

function parseUSGS(json) {
  const ts = json?.value?.timeSeries || [];
  let stage=null, flow=null, obsT=null, SS=[];
  for (const s of ts) {
    const cd = s.variable?.variableCode?.[0]?.value;
    const vals = s.values?.[0]?.value || [];
    if (cd==='00065') {
      const last = vals.filter(v=>v.value!=='-999999').slice(-1)[0];
      if (last) { stage=parseFloat(last.value); obsT=last.dateTime; }
      SS = vals.filter(v=>v.value!=='-999999').map(v=>({t:v.dateTime,v:parseFloat(v.value)}));
    }
    if (cd==='00060') {
      const last = vals.filter(v=>v.value!=='-999999').slice(-1)[0];
      if (last) flow=parseFloat(last.value);
    }
  }
  return {stage, flow, obsT, SS};
}

function parseNOAA(json) {
  const stages = {...S};
  // Try to read stages from API
  const observed = json?.observed?.data || [];
  const forecast = json?.forecast?.data || [];

  // Override stages if provided
  if (json?.flood?.action)   stages.action   = parseFloat(json.flood.action);
  if (json?.flood?.minor)    stages.minor    = parseFloat(json.flood.minor);
  if (json?.flood?.moderate) stages.moderate = parseFloat(json.flood.moderate);
  if (json?.flood?.major)    stages.major    = parseFloat(json.flood.major);

  const forecasts = forecast.map(d => ({
    t: d.time || d.validTime,
    v: parseFloat(d.primary ?? d.stage ?? d.value)
  })).filter(d => !isNaN(d.v));

  return {stages, forecasts};
}

function renderForecastHtml(forecasts) {
  const rows = forecasts.slice(0,10).map(f=>`
    <div class="fr">
      <span class="ft">${fmt(f.t)}</span>
      <span class="fv">${f.v.toFixed(2)} ft</span>
    </div>`).join('');
  return `<div class="card" style="animation-delay:.23s"><div class="ct">NOAA Forecast</div>${rows}</div>`;
}

async function loadAll() {
  const btn = document.getElementById('rbtn');
  if (btn) btn.classList.add('busy');

  const [usgsJson, noaaJson] = await Promise.all([
    fetchWithProxies(USGS_URL, true),
    fetchWithProxies(NOAA_API, true),
  ]);

  document.getElementById('ts').textContent = 'Updated ' + fmt(new Date().toISOString());

  if (!usgsJson) {
    document.getElementById('wrap').innerHTML =
      `<div class="err">Could not load USGS data.<br>Check your connection and try refreshing.</div>`;
    if (btn) btn.classList.remove('busy');
    return;
  }

  const {stage, flow, obsT, SS} = parseUSGS(usgsJson);
  let stages = {...S}, forecasts = [], noaaOk = false;
  if (noaaJson) {
    try { ({stages, forecasts} = parseNOAA(noaaJson)); noaaOk = forecasts.length > 0; } catch(e) {}
  }

  const st = statusFor(stage, stages);
  const fillPct = stage!==null ? Math.max(4,Math.min(97,(stage/(stages.major*1.15))*100)) : 10;
  const d2 = (a,b) => b!==null ? (b-a).toFixed(1) : null;
  const toAct = d2(stage, stages.action), toMin = d2(stage, stages.minor);
  const cut48 = Date.now()-48*3600000;
  const chart48 = SS.filter(d=>new Date(d.t).getTime()>cut48);
  const cut24 = Date.now()-24*3600000;
  const p24 = SS.filter(d=>new Date(d.t).getTime()>cut24);
  const ch24 = p24.length>1&&stage!==null ? (stage-p24[0].v).toFixed(2) : null;
  const pk7 = SS.length ? Math.max(...SS.map(d=>d.v)).toFixed(2) : null;

  const rows = [
    {label:'MAJOR FLOOD',   val:stages.major,    color:'#dc2626'},
    {label:'MODERATE FLOOD',val:stages.moderate, color:'#ea580c'},
    {label:'MINOR FLOOD',   val:stages.minor,    color:'#d97706'},
    {label:'ACTION STAGE',  val:stages.action,   color:'#ca8a04'},
  ];

  const html = `
    ${!noaaOk?`<div class="note">NOAA forecast unavailable &mdash; using NWS hardcoded flood thresholds.</div>`:''}

    <div class="card" style="animation-delay:0s">
      <div class="ct">River Status</div>
      <div class="srow">
        <div class="dot ${st.pulse?'pulse':''}" style="background:${st.color};color:${st.color}"></div>
        <div>
          <div class="slabel">${st.pulse?'&#9888; ':''}${st.label}</div>
          <div class="ssub">${fmt(obsT)}</div>
        </div>
      </div>
    </div>

    ${chart48.length>3?`
    <div class="card" style="animation-delay:.04s">
      <div class="ct">Last 48 Hours (USGS)</div>
      <canvas id="gc" height="190"></canvas>
    </div>`:''}

    <div class="card" style="animation-delay:.08s">
      <div class="ct">Current Stage &amp; Flow</div>
      <div class="rc">
        <div class="bign">${stage!==null?stage.toFixed(2):'&mdash;'}</div>
        <div class="bigu">feet</div>
        ${flow!==null?`<div class="bigf">${Math.round(flow).toLocaleString()} <span style="font-size:13px;color:var(--muted)">cfs</span></div>`:''}
        <div class="bigt">${fmt(obsT)}</div>
      </div>
    </div>

    <div class="card" style="animation-delay:.12s">
      <div class="ct">Flood Stage Levels</div>
      <div class="barw"><div class="barf" id="bf" style="width:0%"></div></div>
      ${rows.map(r=>`
        <div class="sr ${stage!==null&&Math.abs(stage-r.val)<0.9?'on':''}">
          <div class="sl"><div class="sd" style="background:${r.color}"></div><span class="sn">${r.label}</span></div>
          <span class="sv" style="color:${r.color}">${r.val.toFixed(1)} ft</span>
        </div>`).join('')}
      ${stage!==null?`
        <div class="sr on">
          <div class="sl"><div class="sd" style="background:var(--accent)"></div><span class="sn">CURRENT</span></div>
          <span class="sv" style="color:var(--accent)">${stage.toFixed(2)} ft</span>
        </div>`:''}
    </div>

    <div class="g2">
      <div class="ic"><div class="icl">To Action</div>
        <div class="icv" style="color:${toAct!==null&&parseFloat(toAct)<=0?'var(--warn)':'var(--text)'}">
          ${toAct!==null?(parseFloat(toAct)<=0?'AT/ABOVE':'+'+toAct):'&mdash;'}</div>
        <div class="icu">feet</div></div>
      <div class="ic"><div class="icl">To Minor Flood</div>
        <div class="icv" style="color:${toMin!==null&&parseFloat(toMin)<=0?'var(--minor)':'var(--text)'}">
          ${toMin!==null?(parseFloat(toMin)<=0?'FLOODING':'+'+toMin):'&mdash;'}</div>
        <div class="icu">feet</div></div>
      <div class="ic"><div class="icl">24h Change</div>
        <div class="icv" style="color:${ch24!==null?(parseFloat(ch24)>.5?'var(--warn)':parseFloat(ch24)<-.5?'var(--accent2)':'var(--text)'):'var(--text)'}">
          ${ch24!==null?(parseFloat(ch24)>=0?'+':'')+ch24:'&mdash;'}</div>
        <div class="icu">feet</div></div>
      <div class="ic"><div class="icl">7-Day Peak</div>
        <div class="icv">${pk7??'&mdash;'}</div>
        <div class="icu">feet</div></div>
    </div>

    ${forecasts.length?renderForecastHtml(forecasts):''}

    <div class="card" style="animation-delay:.28s">
      <div class="ct">NOAA Hydrograph</div>
      <div class="noaa-img-wrap">
        <img class="noaa-img" src="${NOAA_IMG}?t=${Date.now()}" alt="NOAA hydrograph"
          onerror="this.parentNode.innerHTML='<div style=padding:16px;text-align:center;color:var(--muted);font-size:11px;font-family:var(--mono)>Image unavailable</div>'">
      </div>
    </div>
  `;

  document.getElementById('wrap').innerHTML = html;
  setTimeout(()=>{ const b=document.getElementById('bf'); if(b)b.style.width=fillPct+'%'; },80);
  if(chart48.length>3) drawChart(chart48, stages);
  if(btn) btn.classList.remove('busy');
}

function drawChart(data, stages) {
  const canvas=document.getElementById('gc'); if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth, H=190;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const vals=data.map(d=>d.v), times=data.map(d=>new Date(d.t));
  const minV=Math.min(...vals)*.97, maxV=Math.max(Math.max(...vals)*1.03,stages.action+1);
  const pad={top:14,right:12,bottom:32,left:44};
  const cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;
  const xp=i=>pad.left+(i/(vals.length-1))*cW;
  const yp=v=>pad.top+(1-(v-minV)/(maxV-minV))*cH;
  ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=pad.top+(i/4)*cH;
    ctx.strokeStyle='rgba(30,80,160,.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.font='9px "DM Mono",monospace'; ctx.textAlign='right';
    ctx.fillText((maxV-(i/4)*(maxV-minV)).toFixed(1),pad.left-5,y+3.5);
  }
  [{v:stages.major,c:'#dc2626',l:'MAJOR'},{v:stages.moderate,c:'#ea580c',l:'MOD'},
   {v:stages.minor,c:'#d97706',l:'MINOR'},{v:stages.action,c:'#ca8a04',l:'ACTION'}].forEach(s=>{
    if(s.v<minV||s.v>maxV)return;
    const y=yp(s.v);
    ctx.setLineDash([4,4]); ctx.strokeStyle=s.c+'99'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle=s.c; ctx.font='8px "DM Mono",monospace'; ctx.textAlign='right';
    ctx.fillText(s.l,W-pad.right-2,y-3);
  });
  const g=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
  g.addColorStop(0,'rgba(26,86,196,.18)'); g.addColorStop(1,'rgba(26,86,196,.02)');
  ctx.beginPath(); ctx.moveTo(xp(0),yp(vals[0]));
  for(let i=1;i<vals.length;i++){const x0=xp(i-1),y0=yp(vals[i-1]),x1=xp(i),y1=yp(vals[i]);ctx.bezierCurveTo((x0+x1)/2,y0,(x0+x1)/2,y1,x1,y1);}
  ctx.lineTo(xp(vals.length-1),pad.top+cH); ctx.lineTo(xp(0),pad.top+cH); ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(xp(0),yp(vals[0]));
  for(let i=1;i<vals.length;i++){const x0=xp(i-1),y0=yp(vals[i-1]),x1=xp(i),y1=yp(vals[i]);ctx.bezierCurveTo((x0+x1)/2,y0,(x0+x1)/2,y1,x1,y1);}
  ctx.strokeStyle='#1a56c4'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
  const lx=xp(vals.length-1),ly=yp(vals[vals.length-1]);
  ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#1a56c4'; ctx.lineWidth=2; ctx.stroke();
  [0,Math.floor(vals.length/2),vals.length-1].forEach(i=>{
    if(!times[i])return;
    const label=times[i].toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric'});
    ctx.fillStyle='#94a3b8'; ctx.font='9px "DM Mono",monospace';
    ctx.textAlign=i===0?'left':i===vals.length-1?'right':'center';
    ctx.fillText(label,xp(i),H-8);
  });
}

loadAll();
setInterval(loadAll, 15*60*1000);
</script>
</body>
</html>
